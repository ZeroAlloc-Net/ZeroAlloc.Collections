name: CI

on:
  push:
    branches: [main, 'release-please--**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-commits:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yml

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Calculate version
        id: gitversion
        run: |
          version=$(dotnet dotnet-gitversion /output json /showvariable SemVer)
          echo "semver=$version" >> $GITHUB_OUTPUT
          echo "Calculated version: $version"

      - name: Restore
        run: dotnet restore ZeroAlloc.Collections.slnx

      - name: Build
        run: dotnet build ZeroAlloc.Collections.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ZeroAlloc.Collections.slnx --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"

  aot-smoke:
    runs-on: ubuntu-latest
    # Publishes samples/ZeroAlloc.Collections.AotSmoke with PublishAot=true and runs
    # the binary. Exercises HeapPooledList, HeapRingBuffer, and PooledList (ref struct).
    # Net9.0 has full Native AOT support; the main lib multi-targets ns2.1;net8;net9
    # so net9.0 is the highest TFM we can realistically pin the sample to without
    # bumping the whole project to net10.0.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Install AOT native toolchain
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore samples/ZeroAlloc.Collections.AotSmoke/ZeroAlloc.Collections.AotSmoke.csproj

      - name: Publish AOT
        run: dotnet publish samples/ZeroAlloc.Collections.AotSmoke/ZeroAlloc.Collections.AotSmoke.csproj -r linux-x64 -c Release -o ./aot-out

      - name: Run AOT binary
        run: ./aot-out/ZeroAlloc.Collections.AotSmoke

  api-compat:
    uses: ZeroAlloc-Net/.github/.github/workflows/api-compat.yml@main
    with:
      package-id: ZeroAlloc.Collections
      csproj-path: src/ZeroAlloc.Collections/ZeroAlloc.Collections.csproj
